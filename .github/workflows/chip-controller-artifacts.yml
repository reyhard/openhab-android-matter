name: Build CHIP Controller Artifacts

on:
  workflow_dispatch:
    inputs:
      connectedhomeip_ref:
        description: "connectedhomeip git ref (tag/branch/sha)"
        required: true
        default: "v1.5.1.0"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build and publish connectedhomeip artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CONNECTEDHOMEIP_REF: ${{ github.event.inputs.connectedhomeip_ref || 'v1.5.1.0' }}
      CHIP_ARTIFACT_TAG: chip-controller-artifacts-latest
      CHIP_ARTIFACT_NAME: openhab-chip-artifacts-arm64.zip
      CHIP_ARTIFACT_DIR_NAME: openhab-chip-artifacts-arm64
      KOTLIN_VERSION: 2.1.21

    steps:
      - name: Check out connectedhomeip
        uses: actions/checkout@v6
        with:
          repository: project-chip/connectedhomeip
          ref: ${{ env.CONNECTEDHOMEIP_REF }}
          path: connectedhomeip
          fetch-depth: 1

      - name: Initialize connectedhomeip submodules
        shell: bash
        run: |
          set -euo pipefail
          (
            cd connectedhomeip
            python3 scripts/checkout_submodules.py \
              --shallow \
              --platform android \
              --jobs 8
          )

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Set up Kotlin compiler
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSLo "$RUNNER_TEMP/kotlin-compiler.zip" \
            "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
          unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Refresh production PAA trust store from DCL
        shell: bash
        run: |
          set -euo pipefail
          python3 connectedhomeip/credentials/fetch_paa_certs_from_dcl.py \
            --use-main-net-http \
            --paa-trust-store-path connectedhomeip/credentials/production/paa-root-certs

      - name: Build connectedhomeip Android controller artifacts
        shell: bash
        run: |
          set -eo pipefail
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/28.2.13676358"
          export PATH="$RUNNER_TEMP/kotlinc/bin:$PATH"
          export TERM="${TERM:-xterm-256color}"
          if [[ ! -d "${ANDROID_NDK_HOME}" ]]; then
            echo "::error::Expected NDK directory not found: ${ANDROID_NDK_HOME}"
            exit 1
          fi
          kotlinc -version

          cd connectedhomeip
          set +u
          source scripts/bootstrap.sh
          source scripts/activate.sh
          set -u
          perl -0pi -e 's/(_kotlinc_flags = \[\n)\s+"-Werror",\n(\s+"-Xlint:all",\n\s+\])/$1$2/g' \
            build/chip/java/rules.gni

          python3 scripts/build/build_examples.py \
            --target android-arm64-chip-tool \
            build

      - name: Package artifact layout for openhab-android-matter
        shell: bash
        run: |
          set -euo pipefail
          BUILD_LIB_DIR="$GITHUB_WORKSPACE/connectedhomeip/out/android-arm64-chip-tool/lib"
          PAA_ROOT="$GITHUB_WORKSPACE/connectedhomeip/credentials/production/paa-root-certs"
          CD_ROOT="$GITHUB_WORKSPACE/connectedhomeip/credentials/production/cd-certs"
          OUT_ROOT="$RUNNER_TEMP/$CHIP_ARTIFACT_DIR_NAME"
          OUT_ARCHIVE="$RUNNER_TEMP/$CHIP_ARTIFACT_NAME"

          rm -rf "$OUT_ROOT" "$OUT_ARCHIVE"
          mkdir -p "$OUT_ROOT/jniLibs/arm64-v8a"

          cp "$BUILD_LIB_DIR/src/controller/java/CHIPController.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/CHIPInteractionModel.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/CHIPClusterID.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/CHIPClusters.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/platform/android/AndroidPlatform.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/OnboardingPayload.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/libMatterTlv.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/src/controller/java/libMatterJson.jar" "$OUT_ROOT/"
          cp "$BUILD_LIB_DIR/jni/arm64-v8a/libCHIPController.so" "$OUT_ROOT/jniLibs/arm64-v8a/"
          cp "$BUILD_LIB_DIR/jni/arm64-v8a/libc++_shared.so" "$OUT_ROOT/jniLibs/arm64-v8a/"

          test -d "$PAA_ROOT"
          PAA_CERT_COUNT="$(find "$PAA_ROOT" -type f \( -name '*.pem' -o -name '*.der' \) | wc -l | tr -d '[:space:]')"
          if [[ "$PAA_CERT_COUNT" -lt 1 ]]; then
            echo "::error::No PAA trust-store certificates found in $PAA_ROOT."
            exit 1
          fi
          if ! find "$PAA_ROOT" -type f \( -name '*.pem' -o -name '*.der' \) | grep -Eiq 'IKEA|117C'; then
            echo "::error::DCL-refreshed PAA trust store does not include IKEA VID 0x117C root required by validated device logs."
            exit 1
          fi
          mkdir -p "$OUT_ROOT/paa-root-certs"
          cp -a "$PAA_ROOT"/. "$OUT_ROOT/paa-root-certs/"

          if [[ -d "$CD_ROOT" ]]; then
            CD_CERT_COUNT="$(find "$CD_ROOT" -type f \( -name '*.pem' -o -name '*.der' \) | wc -l | tr -d '[:space:]')"
            if [[ "$CD_CERT_COUNT" -gt 0 ]]; then
              mkdir -p "$OUT_ROOT/cd-certs"
              cp -a "$CD_ROOT"/. "$OUT_ROOT/cd-certs/"
            fi
          fi

          (
            cd "$OUT_ROOT"
            zip -r "$OUT_ARCHIVE" .
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: chip-controller-artifacts-arm64
          path: ${{ runner.temp }}/${{ env.CHIP_ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$CHIP_ARTIFACT_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$CHIP_ARTIFACT_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CHIP Controller Artifacts (latest)" \
              --notes "Auto-published connectedhomeip artifacts for openhab-android-matter CI."

          gh release upload "$CHIP_ARTIFACT_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            "$RUNNER_TEMP/$CHIP_ARTIFACT_NAME#$CHIP_ARTIFACT_NAME" \
            --clobber
