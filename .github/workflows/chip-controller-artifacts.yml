name: Build CHIP Controller Artifacts

on:
  workflow_dispatch:
    inputs:
      connectedhomeip_ref:
        description: "connectedhomeip git ref (tag/branch/sha)"
        required: true
        default: "v1.5.1.0"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build and publish connectedhomeip artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CONNECTEDHOMEIP_REF: ${{ github.event.inputs.connectedhomeip_ref || 'v1.5.1.0' }}
      CHIP_ARTIFACT_TAG: chip-controller-artifacts-latest
      CHIP_ARTIFACT_NAME: openhab-chip-artifacts-arm64.zip
      CHIP_ARTIFACT_DIR_NAME: openhab-chip-artifacts-arm64

    steps:
      - name: Check out connectedhomeip
        uses: actions/checkout@v6
        with:
          repository: project-chip/connectedhomeip
          ref: ${{ env.CONNECTEDHOMEIP_REF }}
          path: connectedhomeip
          fetch-depth: 1

      - name: Initialize connectedhomeip submodules
        shell: bash
        run: |
          set -euo pipefail
          git -C connectedhomeip submodule sync --recursive
          git -C connectedhomeip submodule update --init --recursive --depth 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Build connectedhomeip Android controller artifacts
        shell: bash
        run: |
          set -eo pipefail
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/28.2.13676358"
          export TERM="${TERM:-xterm-256color}"
          if [[ ! -d "${ANDROID_NDK_HOME}" ]]; then
            echo "::error::Expected NDK directory not found: ${ANDROID_NDK_HOME}"
            exit 1
          fi

          cd connectedhomeip
          set +u
          source scripts/bootstrap.sh
          source scripts/activate.sh
          set -u

          python3 scripts/build/build_examples.py \
            --target android-arm64-chip-tool \
            build \
            --copy-artifacts-to "$RUNNER_TEMP/chip-artifacts-raw"

      - name: Package artifact layout for openhab-android-matter
        shell: bash
        run: |
          set -euo pipefail
          RAW_DIR="$RUNNER_TEMP/chip-artifacts-raw"
          OUT_ROOT="$RUNNER_TEMP/$CHIP_ARTIFACT_DIR_NAME"
          OUT_ARCHIVE="$RUNNER_TEMP/$CHIP_ARTIFACT_NAME"

          rm -rf "$OUT_ROOT" "$OUT_ARCHIVE"
          mkdir -p "$OUT_ROOT/jniLibs/arm64-v8a"

          cp "$RAW_DIR/CHIPController.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/CHIPInteractionModel.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/CHIPClusterID.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/CHIPClusters.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/AndroidPlatform.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/OnboardingPayload.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/libMatterTlv.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/libMatterJson.jar" "$OUT_ROOT/"
          cp "$RAW_DIR/jni/arm64-v8a/libCHIPController.so" "$OUT_ROOT/jniLibs/arm64-v8a/"
          cp "$RAW_DIR/jni/arm64-v8a/libc++_shared.so" "$OUT_ROOT/jniLibs/arm64-v8a/"

          (
            cd "$OUT_ROOT"
            zip -r "$OUT_ARCHIVE" .
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: chip-controller-artifacts-arm64
          path: ${{ runner.temp }}/${{ env.CHIP_ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$CHIP_ARTIFACT_TAG" >/dev/null 2>&1 || \
            gh release create "$CHIP_ARTIFACT_TAG" \
              --title "CHIP Controller Artifacts (latest)" \
              --notes "Auto-published connectedhomeip artifacts for openhab-android-matter CI."

          gh release upload "$CHIP_ARTIFACT_TAG" \
            "$RUNNER_TEMP/$CHIP_ARTIFACT_NAME#$CHIP_ARTIFACT_NAME" \
            --clobber
