name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-apk:
    name: Build, test, and publish debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APK_PATH: app/build/outputs/apk/debug/openhab-matter-helper.apk

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4.3.1

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Run Android lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Validate connectedhomeip artifact checks
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/test_connectedhomeip_artifacts.ps1 -GradlePath ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Validate release build
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify APK artifact
        run: |
          test -s "$APK_PATH"
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/test_apk_badging.ps1 -ApkPath "$APK_PATH"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: openhab-matter-helper-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
          retention-days: 14
